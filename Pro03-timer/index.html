<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Timer</title>
</head>
<body>
    <div class="main">
       <div class="timer-field">
         <input type="text" placeholder="Enter time in seconds"  id="input" class="input-field">
        <button id="start-btn" class="timer-btn">Start Timer</button>
        <button id="pause" class="timer-btn">Pause</button>
        <button id="resume" class="timer-btn">Resume</button>
       </div>
        <p id="display-field"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
